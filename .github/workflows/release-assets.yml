name: Release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build assets for, for example v1.0.10
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  python-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install build

      - name: Verify generated renderer
        run: python scripts/build_renderer_inject.py && git diff --exit-code -- codex_session_delete/inject/renderer-inject.js assets/inject/renderer-inject.js

      - name: Build Python distributions
        run: python -m build

      - name: Create SHA-256 checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          for file in *; do
            if [[ "$file" != "SHA256SUMS" && "$file" != *.sha256 ]]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      - name: Create source package
        run: |
          git archive \
            --format=zip \
            --output=CodexPlusPlus.zip \
            --prefix=CodexPlusPlus/ \
            HEAD
          sha256sum CodexPlusPlus.zip > CodexPlusPlus.zip.sha256

      - name: Attest release artifacts
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*
            CodexPlusPlus.zip

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*
            CodexPlusPlus.zip
            CodexPlusPlus.zip.sha256

  desktop-assets:
    name: Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify generated renderer
        shell: bash
        run: python scripts/build_renderer_inject.py && git diff --exit-code -- codex_session_delete/inject/renderer-inject.js assets/inject/renderer-inject.js

      - name: Install manager dependencies
        working-directory: apps/codex-plus-manager
        run: npm install

      - name: Build desktop app
        working-directory: apps/codex-plus-manager
        run: npm run build

      - name: Build silent launcher
        run: cargo build --release -p codex-plus-launcher

      - name: Package Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $version = "${{ env.RELEASE_TAG }}" -replace '^v', ''
          New-Item -ItemType Directory -Force -Path dist/windows/app | Out-Null
          $launcher = "target/release/codex-plus-plus.exe"
          $managerCandidates = @(
            "target/release/codex-plus-plus-manager.exe",
            "apps/codex-plus-manager/src-tauri/target/release/codex-plus-plus-manager.exe"
          )
          $manager = $managerCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (!(Test-Path -LiteralPath $launcher)) { throw "Missing silent launcher: $launcher" }
          if (!$manager) { throw "Missing manager binary" }
          Copy-Item -LiteralPath $launcher -Destination dist/windows/app/codex-plus-plus.exe -Force
          Copy-Item -LiteralPath $manager -Destination dist/windows/app/codex-plus-plus-manager.exe -Force
          $makensisCommand = Get-Command makensis.exe -ErrorAction SilentlyContinue
          $makensisCandidates = @(
            $makensisCommand.Source,
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
            "${env:ProgramFiles}\NSIS\makensis.exe",
            "C:\ProgramData\chocolatey\bin\makensis.exe"
          ) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }
          $makensis = $makensisCandidates | Select-Object -First 1
          if (!$makensis) { throw "Missing makensis.exe after NSIS install" }
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" "scripts/installer/windows/CodexPlusPlus.nsi"

      - name: Package macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          bash scripts/installer/macos/package-dmg.sh "$VERSION"

      - name: Collect desktop artifacts
        shell: bash
        run: |
          mkdir -p desktop-dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp dist/windows/CodexPlusPlus-*-windows-x64-setup.exe desktop-dist/
          elif [ "$RUNNER_OS" = "macOS" ]; then
            cp dist/macos/CodexPlusPlus-*-macos-universal.dmg desktop-dist/
          fi
          cd desktop-dist
          if compgen -G "*" >/dev/null; then
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum * > SHA256SUMS-${{ matrix.os }}
            else
              shasum -a 256 * > SHA256SUMS-${{ matrix.os }}
            fi
          else
            echo "No desktop artifacts found"
            exit 1
          fi

      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: desktop-dist/*
