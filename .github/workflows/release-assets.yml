name: Release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build assets for, for example v1.0.16
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  desktop-assets:
    name: Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install manager dependencies
        working-directory: apps/codex-plus-manager
        run: npm install

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset -y --no-progress

      - name: Build silent launcher
        run: cargo build --release -p codex-plus-launcher

      - name: Stage Windows launcher sidecar
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sidecarDir = "apps/codex-plus-manager/src-tauri/binaries"
          $sidecar = "$sidecarDir/codex-plus-plus-x86_64-pc-windows-msvc.exe"
          $launcher = "target/release/codex-plus-plus.exe"
          if (!(Test-Path -LiteralPath $launcher)) { throw "Missing silent launcher: $launcher" }
          New-Item -ItemType Directory -Force -Path $sidecarDir | Out-Null
          Copy-Item -LiteralPath $launcher -Destination $sidecar -Force

      - name: Build Windows MSI
        if: runner.os == 'Windows'
        working-directory: apps/codex-plus-manager
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build

      - name: Build macOS desktop binaries
        if: runner.os == 'macOS'
        shell: bash
        run: |
          npm run --prefix apps/codex-plus-manager vite:build
          cargo build --release -p codex-plus-manager

      - name: Package macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          bash scripts/installer/macos/package-dmg.sh "$VERSION"

      - name: Collect desktop artifacts
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          mkdir -p desktop-dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            VERSION="${RELEASE_TAG#v}"
            msi=""
            for candidate in \
              apps/codex-plus-manager/src-tauri/target/release/bundle/msi/*.msi \
              target/release/bundle/msi/*.msi
            do
              if [ -f "$candidate" ]; then
                msi="$candidate"
                break
              fi
            done
            if [ -z "$msi" ]; then
              echo "No Windows MSI artifact found"
              find apps/codex-plus-manager/src-tauri/target target -path '*/bundle/msi/*' -type f 2>/dev/null || true
              exit 1
            fi
            cp "$msi" "desktop-dist/Dex-${VERSION}-windows-x64.msi"
            sig="${msi}.sig"
            if [ ! -f "$sig" ]; then
              if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
                echo "Missing TAURI_SIGNING_PRIVATE_KEY for updater signature" >&2
                exit 1
              fi
              key_file="$(mktemp)"
              printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$key_file"
              sign_args=(--private-key-path "$key_file")
              if [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
                sign_args+=(--password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD")
              fi
              npm --prefix apps/codex-plus-manager exec tauri signer sign -- "${sign_args[@]}" "$msi" > "$sig"
            fi
            if [ -f "$sig" ]; then
              cp "$sig" "desktop-dist/Dex-${VERSION}-windows-x64.msi.sig"
            else
              echo "No Windows updater signature found: $sig"
              exit 1
            fi
          elif [ "$RUNNER_OS" = "macOS" ]; then
            cp dist/macos/Dex-*-macos-universal.dmg desktop-dist/
          fi
          cd desktop-dist
          if compgen -G "*" >/dev/null; then
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum * > SHA256SUMS-${{ matrix.os }}
            else
              shasum -a 256 * > SHA256SUMS-${{ matrix.os }}
            fi
          else
            echo "No desktop artifacts found"
            exit 1
          fi

      - name: Attest desktop artifacts
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: desktop-dist/*

      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: desktop-dist/*

  latest-json:
    name: Upload static latest.json
    runs-on: ubuntu-latest
    needs: desktop-assets

    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' --dir .
          node <<'NODE'
          const fs = require("fs");
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPO;
          const tag = release.tagName || process.env.TAG;
          const version = tag.replace(/^v/i, "");
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;
          const names = new Set((release.assets || []).map((asset) => asset.name));
          const signatureFor = (name) => {
            const sigName = `${name}.sig`;
            if (!names.has(sigName)) return null;
            return fs.readFileSync(sigName, "utf8").trim();
          };
          const platforms = {};
          for (const name of names) {
            if (!/^Dex-.+-windows-x64\.msi$/i.test(name)) continue;
            const signature = signatureFor(name);
            if (!signature) continue;
            platforms["windows-x86_64"] = {
              signature,
              url: `${baseUrl}/${encodeURIComponent(name)}`
            };
          }
          if (!platforms["windows-x86_64"]) {
            throw new Error("Missing signed Windows updater asset");
          }
          const payload = {
            version,
            notes: release.body || "",
            pub_date: new Date().toISOString(),
            platforms
          };
          fs.writeFileSync("latest.json", `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
