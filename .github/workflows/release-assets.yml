name: Release assets

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  python-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install build

      - name: Verify generated renderer
        run: python scripts/build_renderer_inject.py && git diff --exit-code -- codex_session_delete/inject/renderer-inject.js assets/inject/renderer-inject.js

      - name: Build Python distributions
        run: python -m build

      - name: Create SHA-256 checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          for file in *; do
            if [[ "$file" != "SHA256SUMS" && "$file" != *.sha256 ]]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      - name: Create source package
        run: |
          git archive \
            --format=zip \
            --output=CodexPlusPlus.zip \
            --prefix=CodexPlusPlus/ \
            HEAD
          sha256sum CodexPlusPlus.zip > CodexPlusPlus.zip.sha256

      - name: Attest release artifacts
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*
            CodexPlusPlus.zip

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/*
            CodexPlusPlus.zip
            CodexPlusPlus.zip.sha256

  desktop-assets:
    name: Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify generated renderer
        shell: bash
        run: python scripts/build_renderer_inject.py && git diff --exit-code -- codex_session_delete/inject/renderer-inject.js assets/inject/renderer-inject.js

      - name: Install manager dependencies
        working-directory: apps/codex-plus-manager
        run: npm install

      - name: Build desktop app
        working-directory: apps/codex-plus-manager
        run: npm run build

      - name: Collect desktop artifacts
        shell: bash
        run: |
          mkdir -p desktop-dist
          for bundle_dir in target/release/bundle apps/codex-plus-manager/src-tauri/target/release/bundle; do
            if [ -d "$bundle_dir" ]; then
              find "$bundle_dir" -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.app.tar.gz' \) -print -exec cp {} desktop-dist/ \;
            fi
          done
          cd desktop-dist
          if compgen -G "*" >/dev/null; then
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum * > SHA256SUMS-${{ matrix.os }}
            else
              shasum -a 256 * > SHA256SUMS-${{ matrix.os }}
            fi
          else
            echo "No desktop artifacts found"
            exit 1
          fi

      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: desktop-dist/*
